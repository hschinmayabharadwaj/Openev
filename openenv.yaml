name: neon-syndicate-openenv
version: 1.0.0
description: |
  A cinematic multi-agent strategy simulator where an AI agent must negotiate faction
  alliances, manage constrained resources, execute mission operations, and secure clean
  extraction under partial observability and delayed rewards.
author: chinmayabharadwajhs
tags:
  - openenv
  - multi-agent
  - strategy-game
  - world-modeling
  - long-horizon
  - evaluation
entrypoint:
  type: api
  command: uvicorn server.app:app --host 0.0.0.0 --port 7860
api:
  base_url: http://localhost:7860
  endpoints:
    reset: /reset
    step: /step
    state: /state
    tasks: /tasks
observation_model: Observation
action_model: Action
reward_model: Reward
episode:
  max_steps: 12
tasks:
  - task_id: task_easy_docklands_relay
    difficulty: easy
  - task_id: task_easy_data_spire_broker
    difficulty: easy
  - task_id: task_medium_undergrid_blackout
    difficulty: medium
  - task_id: task_medium_citadel_convoy
    difficulty: medium
  - task_id: task_hard_orchid_coup
    difficulty: hard
  - task_id: task_hard_citywide_failsafe
    difficulty: hard